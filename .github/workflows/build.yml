name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: native-x86-release
            arch: x86
          - preset: native-x64-release
            arch: x64

    name: MSVC ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v5

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: crashloggerpp-${{ matrix.arch }}
          path: build/${{ matrix.preset }}/crashloggerpp.dll
