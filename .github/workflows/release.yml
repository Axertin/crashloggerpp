name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: native-x86-release
            arch: x86
          - preset: native-x64-release
            arch: x64

    name: Build ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p staging
          cp build/${{ matrix.preset }}/crashloggerpp.dll staging/
          cp include/crashloggerpp.h staging/

      - name: Create release archive
        shell: bash
        run: cd staging && 7z a ../crashloggerpp-${{ inputs.tag }}-${{ matrix.arch }}.zip *

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: crashloggerpp-${{ inputs.tag }}-${{ matrix.arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: release/*.zip
